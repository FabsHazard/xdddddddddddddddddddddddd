name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # Ejecutar el workflow cuando se haga push a `main`
  workflow_dispatch:  # Permitir ejecución manual desde la pestaña Actions en GitHub

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Actualizado a la última versión

      - name: Install dependencies
        run: npm ci  # Asegura una instalación limpia de paquetes

      - name: Build site
        run: npm run build  # Construye el sitio

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1  # Nueva versión recomendada
        with:
          path: ./dist  # Asegúrate de que el directorio de salida sea correcto

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2  # Versión más reciente de la acción de despliegue
