name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # Triggers the workflow on push to the `main` branch
  workflow_dispatch:  # Allows manual execution from the GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to latest stable version

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3  # Upgraded version
        with:
          packages: git curl
          version: 1.0

      - name: Install dependencies
        run: npm ci  # Ensures a clean installation of dependencies

      - name: Build site
        run: npm run build  # Builds the site

      - name: Upload artifact
        uses: actions/upload-artifact@v4  # 🔥 Cambiado a v4 para evitar el error de deprecación
        with:
          name: github-pages
          path: ./dist  # Asegúrate de que sea la carpeta correcta

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2  # Mantiene la versión actual
